name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl wget \
            build-essential cmake ninja-build \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libltdl-dev \
            ffmpeg \
            lld \
            ccache

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Cache Android SDK and NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
          key: android-sdk-ndk-${{ runner.os }}-v3
          restore-keys: android-sdk-ndk-${{ runner.os }}-

      - name: Install Python build tools
        run: |
          pip install --upgrade pip wheel
          pip install "cython==0.29.37"
          pip install "buildozer==1.5.0"
          pip install kivy==2.2.1 kivymd==1.1.1 pillow

      - name: Create placeholder app icon (if missing)
        run: |
          mkdir -p assets/icons
          if [ ! -f assets/icons/app_icon.png ]; then
            python3 - <<'EOF'
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (512, 512), (18, 18, 26, 255))
          d = ImageDraw.Draw(img)
          d.ellipse([40, 40, 472, 472], fill=(25, 45, 120, 255))
          d.ellipse([80, 80, 432, 432], fill=(30, 60, 180, 255))
          img.save('assets/icons/app_icon.png')
          print("Icon created")
          EOF
          fi

      - name: Create placeholder model files (build-time only)
        run: |
          mkdir -p assets/models/piper assets/whisper assets/piper
          echo "placeholder" > assets/models/ggml-tiny.en.bin.placeholder
          echo "placeholder" > assets/models/piper/.gitkeep

      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android"
          echo "count=0" > "$HOME/.android/repositories.cfg"
          if [ -d "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools" ]; then
            yes | find "$HOME/.buildozer/android/platform/android-sdk" -name "sdkmanager" -exec {} --licenses \; 2>/dev/null || true
          fi

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "Exit code: $?"

      - name: Find APK files
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== bin/ directory ==="
          ls -la bin/ 2>/dev/null || echo "No bin/ directory"
          echo "=== build.log tail ==="
          tail -50 build.log 2>/dev/null || echo "No build.log"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: offline-dubbing-studio-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7
